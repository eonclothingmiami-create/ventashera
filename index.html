<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hera Swimwear - Control de Ventas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* ================= ESTILOS GENERALES ================= */
        :root {
            --primary: #d4af37; /* Dorado Hera */
            --bg-dark: #1a1a1a;
            --text-light: #f5f5f5;
            --sidebar-width: 250px;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* ================= SIDEBAR ================= */
        #sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-dark);
            color: var(--text-light);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        #sidebar.collapsed {
            width: 60px;
        }
        .brand-logo {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid #333;
            letter-spacing: 2px;
        }
        .menu-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #2a2a2a;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .menu-item:hover {
            background-color: var(--primary);
            color: #000;
        }
        /* ================= MAIN CONTENT ================= */
        #main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        .page {
            display: none;
            animation: fadeIn 0.4s;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ================= COMPONENTES ================= */
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--bg-dark);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background-color: var(--primary);
            color: black;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: var(--bg-dark);
            color: white;
        }
        .grid-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .stat-box {
            background: var(--primary);
            padding: 20px;
            border-radius: 8px;
            color: #000;
            text-align: center;
        }
        .stat-box h3 { margin: 0; font-size: 2rem; }
        .stat-box p { margin: 5px 0 0 0; font-weight: bold; }
        #qrcode-container { margin-top: 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="brand-logo" id="brand-text">HERA SWIMWEAR</div>
        <div class="menu-item" onclick="toggleSidebar()">☰ Ocultar/Mostrar Menú</div>
        <div class="menu-item" onclick="showPage('dashboard')">📊 Dashboard & Metas</div>
        <div class="menu-item" onclick="showPage('ventas')">🛍️ Nueva Venta</div>
        <div class="menu-item" onclick="showPage('historial')">📋 Historial</div>
        <div class="menu-item" onclick="showPage('colaboradores')">👥 Colaboradores</div>
        <div class="menu-item" onclick="showPage('inventario')">📦 Inventario</div>
    </nav>

    <div id="main-content">
        
        <div id="dashboard" class="page active">
            <h2>Dashboard y Metas</h2>
            <div id="dashboard-content"></div> </div>

        <div id="ventas" class="page">
            <h2>Registrar Nueva Venta</h2>
            <div class="card" id="ventas-content"></div> </div>

        <div id="historial" class="page">
            <h2>Historial de Movimientos</h2>
            <div class="card" id="historial-content"></div> </div>

        <div id="colaboradores" class="page">
            <h2>Gestión de Colaboradores</h2>
            <div class="card" id="colaboradores-content"></div> </div>

        <div id="inventario" class="page">
            <h2>Catálogo e Inventario</h2>
            <div class="card" id="inventario-content"></div> </div>

    </div>

    <script>
        // 1. ESTADO GLOBAL DE LA APLICACIÓN (Base de datos en memoria)
        const today = () => new Date().toISOString().split('T')[0];

        let state = {
            meta: 50000000,
            diasLocal: 26,
            diasInter: 4
        };

        let histFilters = {
            start: today(),
            end: today()
        };

        let currentEmp = null; // Empleado seleccionado para editar
        let carrito = []; // Carrito de compras actual

        // Datos de prueba (Simulando lo que tendrías en tu sistema)
        let inventarioData = [
            { id: 1, ref: "H-001", nombre: "Enterizo Mónaco", precio: 180000, imagen: "assets/img1.jpg" },
            { id: 2, ref: "H-002", nombre: "Bikini Santorini", precio: 150000, imagen: "assets/img2.jpg" }
        ];

        let ventasData = [];

        // 2. FUNCIONES DE NAVEGACIÓN Y UI
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        function showPage(pageId) {
            // Ocultar todas las páginas
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // Mostrar la seleccionada
            document.getElementById(pageId).classList.add('active');
            
            // Renderizar el contenido dinámico de la página seleccionada
            if(pageId === 'dashboard') renderDashboard();
            if(pageId === 'ventas') renderVentas();
            if(pageId === 'historial') renderHistorial();
            if(pageId === 'colaboradores') renderColaboradores();
            if(pageId === 'inventario') renderInventario();
        }

        // 3. FUNCIONES DE RENDERIZADO (Inyección de HTML dinámico)

        function renderDashboard() {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = `
                <div class="card">
                    <h3>Configuración de Metas Mensuales</h3>
                    <div class="grid-dashboard" style="margin-top:15px;">
                        <div class="form-group">
                            <label>Meta General ($)</label>
                            <input type="number" class="form-control" id="meta-input" value="${state.meta}">
                        </div>
                        <div class="form-group">
                            <label>Días Hábiles (Local)</label>
                            <input type="number" class="form-control" id="dias-local-input" value="${state.diasLocal}">
                        </div>
                        <div class="form-group">
                            <label>Días (Internacional)</label>
                            <input type="number" class="form-control" id="dias-inter-input" value="${state.diasInter}">
                        </div>
                    </div>
                    <button onclick="updateMetas()">Actualizar Metas</button>
                </div>
                
                <div class="grid-dashboard">
                    <div class="stat-box">
                        <h3>$${(state.meta / state.diasLocal).toLocaleString()}</h3>
                        <p>Meta Diaria Local Sugerida</p>
                    </div>
                    <div class="stat-box" style="background: #333; color: white;">
                        <h3>0</h3>
                        <p>Ventas Hoy</p>
                    </div>
                </div>
            `;
        }

        function renderVentas() {
            const container = document.getElementById('ventas-content');
            
            // Generar filas del carrito
            let filasCarrito = carrito.map((item, index) => `
                <tr>
                    <td>${item.nombre}</td>
                    <td>
                        <input type="number" value="${item.cantidad}" onchange="updateCant(${index}, this.value)" style="width: 60px;">
                    </td>
                    <td>$${item.precio.toLocaleString()}</td>
                    <td>$${(item.cantidad * item.precio).toLocaleString()}</td>
                    <td><button onclick="removeFromCart(${index})" style="background: red; padding: 5px 10px;">X</button></td>
                </tr>
            `).join('');

            container.innerHTML = `
                <div class="form-group">
                    <label>Seleccionar Producto</label>
                    <select class="form-control" id="producto-select">
                        <option value="">-- Elige una prenda Hera --</option>
                        ${inventarioData.map(a => `<option value="${a.id}">${a.ref} - ${a.nombre} ($${a.precio})</option>`).join('')}
                    </select>
                </div>
                <button onclick="addToCart()">Agregar al Carrito</button>

                <h3 style="margin-top: 30px;">Carrito Actual</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio Unit.</th>
                            <th>Subtotal</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${carrito.length > 0 ? filasCarrito : '<tr><td colspan="5" style="text-align:center;">El carrito está vacío</td></tr>'}
                    </tbody>
                </table>
                
                <div style="margin-top: 20px; text-align: right;">
                    <h3>Total: $${carrito.reduce((sum, item) => sum + (item.cantidad * item.precio), 0).toLocaleString()}</h3>
                    <button onclick="procesarVenta()" style="background: #28a745; font-size: 1.1rem; padding: 15px 30px;">Confirmar Pago</button>
                </div>

                <div id="qrcode-container"></div>
            `;
        }

        function renderHistorial() {
            const container = document.getElementById('historial-content');
            container.innerHTML = `
                <div class="grid-dashboard" style="margin-bottom: 20px;">
                    <div class="form-group">
                        <label>Fecha Inicio</label>
                        <input type="date" class="form-control" id="hist-start" value="${histFilters.start}">
                    </div>
                    <div class="form-group">
                        <label>Fecha Fin</label>
                        <input type="date" class="form-control" id="hist-end" value="${histFilters.end}">
                    </div>
                    <div class="form-group" style="display:flex; align-items:flex-end;">
                        <button onclick="filtrarHistorial()">Filtrar</button>
                    </div>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Ref</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="3" style="text-align:center;">No hay ventas en este rango.</td></tr>
                    </tbody>
                </table>
            `;
        }

        function renderColaboradores() {
            const container = document.getElementById('colaboradores-content');
            
            // Si currentEmp es nulo, los campos estarán vacíos. Si tiene datos, los pre-llena.
            let emp = currentEmp || {};

            container.innerHTML = `
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" class="form-control" id="emp-nombre" value="${emp.nombre || ''}">
                </div>
                <div class="form-group">
                    <label>Cédula (CC)</label>
                    <input type="text" class="form-control" id="emp-cedula" value="${emp.cedula || ''}">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" class="form-control" id="emp-tel" value="${emp.telefono || ''}">
                </div>
                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" class="form-control" id="emp-dir" value="${emp.direccion || ''}">
                </div>
                <div class="form-group">
                    <label>Cargo</label>
                    <input type="text" class="form-control" id="emp-cargo" value="${emp.cargo || ''}">
                </div>
                <div class="form-group">
                    <label>Salario Base (Predeterminado 1.75M)</label>
                    <input type="number" class="form-control" id="emp-salario" value="${emp.salarioBase || 1750000}">
                </div>
                
                <button style="margin-top:15px;" onclick="saveEmpleado()">💾 GUARDAR EN HERA</button>
                <button style="margin-top:15px; background: #dc3545;" onclick="limpiarFormEmpleado()">Cancelar / Limpiar</button>
            `;
        }

        function renderInventario() {
            const container = document.getElementById('inventario-content');
            let filas = inventarioData.map(a => `
                <tr>
                    <td><img src="${a.imagen}" alt="IMG" style="width:40px; height:40px; object-fit:cover; border-radius:4px;" onerror="this.src='https://via.placeholder.com/40?text=Hera'"></td>
                    <td>${a.ref}</td>
                    <td>${a.nombre}</td>
                    <td>$${a.precio.toLocaleString()}</td>
                </tr>
            `).join('');

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Referencia</th>
                            <th>Prenda</th>
                            <th>Precio Comercial</th>
                        </tr>
                    </thead>
                    <tbody>${filas}</tbody>
                </table>
            `;
        }

        // 4. FUNCIONES LÓGICAS (Acciones de los botones)

        function updateMetas() {
            state.meta = document.getElementById('meta-input').value;
            state.diasLocal = document.getElementById('dias-local-input').value;
            state.diasInter = document.getElementById('dias-inter-input').value;
            renderDashboard(); // Recargar la vista con los nuevos datos
            alert("Metas actualizadas correctamente.");
        }

        function addToCart() {
            const select = document.getElementById('producto-select');
            const prodId = parseInt(select.value);
            if(!prodId) return alert("Selecciona una prenda primero");
            
            const producto = inventarioData.find(p => p.id === prodId);
            carrito.push({ ...producto, cantidad: 1 });
            renderVentas();
        }

        function updateCant(index, val) {
            carrito[index].cantidad = parseInt(val) || 1;
            renderVentas();
        }

        function removeFromCart(index) {
            carrito.splice(index, 1);
            renderVentas();
        }

        function procesarVenta() {
            if(carrito.length === 0) return alert("El carrito está vacío");
            
            // Lógica de venta (se guardaría en base de datos)
            alert("Venta registrada con éxito.");
            
            // Generar código QR de la factura (Ejemplo visual)
            const qrContainer = document.getElementById("qrcode-container");
            qrContainer.innerHTML = ""; // Limpiar qr anterior
            new QRCode(qrContainer, {
                text: "https://tumarca.com/factura/12345",
                width: 128,
                height: 128
            });

            // Limpiar carrito después de unos segundos
            setTimeout(() => {
                carrito = [];
                renderVentas();
            }, 3000);
        }

        function filtrarHistorial() {
            histFilters.start = document.getElementById('hist-start').value;
            histFilters.end = document.getElementById('hist-end').value;
            // Aquí iría la lógica para filtrar array de ventas
            alert(`Filtrando desde ${histFilters.start} hasta ${histFilters.end}`);
        }

        function saveEmpleado() {
            const nombre = document.getElementById('emp-nombre').value;
            const cedula = document.getElementById('emp-cedula').value;
            const salario = document.getElementById('emp-salario').value;
            
            if(!nombre || !cedula) return alert("Nombre y Cédula son obligatorios.");

            // Aquí guardarías en tu base de datos o localStorage
            console.log("Guardando colaborador:", { nombre, cedula, salario });
            alert(`Colaborador ${nombre} guardado correctamente.`);
            limpiarFormEmpleado();
        }

        function limpiarFormEmpleado() {
            currentEmp = null;
            renderColaboradores();
        }

        // 5. INICIALIZACIÓN (Lo que ocurre al abrir la página)
        window.onload = () => {
            showPage('dashboard'); // Cargar el dashboard por defecto al abrir
        };
    </script>
</body>
</html>
